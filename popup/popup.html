<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Save to Readwise</title>
</head>
<body>
  <!-- Shown when no token is stored yet -->
  <section id="setup" class="view hidden">
    <h1><svg class="mark" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>Featherwise</h1>
    <p class="muted">Add your Readwise access token to get started.</p>
    <button id="openOptions" class="primary">Set up token</button>
  </section>

  <!-- Main save view -->
  <section id="main" class="view hidden">
    <h1><svg class="mark" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>Featherwise</h1>
    <p id="pageTitle" class="page-title" title=""></p>

    <label for="tags">Tags <span class="muted">(comma-separated)</span></label>
    <input id="tags" type="text" list="tagSuggestions" placeholder="e.g. research, to-read" autocomplete="off" />
    <datalist id="tagSuggestions"></datalist>

    <label for="location">Location</label>
    <select id="location">
      <option value="new">New</option>
      <option value="later">Later</option>
      <option value="archive">Archive</option>
    </select>

    <button id="savePage" class="primary">Save page</button>
    <button id="saveHighlight" class="secondary hidden">Save selection as highlight</button>

    <p id="mode" class="mode muted"></p>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
